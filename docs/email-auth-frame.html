<!--
  Shared Lance auth email frame (Supabase Authentication → Email Templates).
  Header: white wordmark (lance-logo-white.png). Footer: black wordmark (lance-logo-black.svg).
-->
<!-- LANCE_EMAIL_LOGO_WHITE: https://www.getlance.app/email/lance-logo-white.png -->
<!-- LANCE_EMAIL_LOGO_BLACK: https://www.getlance.app/email/lance-logo-black.svg -->
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style type="text/css">
    body { margin: 0; padding: 0; -webkit-text-size-adjust: 100%; }
    img { border: 0; height: auto; line-height: 100%; outline: none; text-decoration: none; }
    a { color: #9B63E9; text-decoration: none; font-weight: 600; }
  </style>
</head>
<body style="margin:0; padding:0; background-color:#f3f4f6;">
  <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="background-color:#f3f4f6;">
    <tr>
      <td align="center" style="padding:32px 20px;">
        <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="max-width:640px; width:100%;">
          <tr>
            <td style="font-family:Arial,Helvetica,sans-serif; border:1px solid #e5e7eb; border-radius:12px; overflow:hidden; background:#ffffff;">
              <div style="padding:18px 20px; background:#9B63E9; color:#ffffff;">
                <a href="{{ .SiteURL }}" target="_blank" rel="noopener" style="text-decoration:none; color:#ffffff;">
                  <img src="https://www.getlance.app/email/lance-logo-white.png" alt="Lance" width="120" height="28" style="height:28px; max-width:160px; width:auto; object-fit:contain; display:block; border:0;" />
                </a>
              </div>
              <div style="padding:24px 20px; font-size:15px; line-height:1.6; color:#111827;">
                <!-- MAIN_CONTENT -->
              </div>
              <div style="padding:14px 20px; font-size:12px; color:#6b7280; border-top:1px solid #e5e7eb;">
                <img src="https://www.getlance.app/email/lance-logo-black.svg" alt="Lance" width="80" height="20" style="height:20px; max-width:100px;width:auto;display:block;margin-bottom:8px;border:0;" />
                Sent by <span style="color:#9B63E9; font-weight:600;">Lance</span>
                <span style="color:#9ca3af;"> · </span>
                <a href="{{ .SiteURL }}/help" style="color:#6b7280; font-weight:normal;">Help</a>
                <span style="color:#9ca3af;"> · </span>
                <a href="{{ .SiteURL }}/terms" style="color:#6b7280; font-weight:normal;">Terms</a>
                <span style="color:#9ca3af;"> · </span>
                <a href="{{ .SiteURL }}/privacy" style="color:#6b7280; font-weight:normal;">Privacy</a>
                <p style="margin:12px 0 0 0;">This email was sent to {{ .Email }}.</p>
              </div>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
